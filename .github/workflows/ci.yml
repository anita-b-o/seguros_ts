name: CI Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Run pip-audit (backend)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit (frontend production deps)
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high

  backend-quality:
    name: Backend Tests + Deploy Check
    runs-on: ubuntu-latest
    needs: security-audit
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Prepare virtualenv
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Run backend test suite
        run: ./scripts/test_all.sh

      - name: Run deploy security checks
        env:
          DJANGO_ENV: production
          DJANGO_DEBUG: "false"
          DJANGO_SKIP_DOTENV: "true"
          DJANGO_SECRET_KEY: "AbCdEfGhIjKlMnOpQrStUvWxYz0123456789abcdefGHIJKLMN987654"
          DJANGO_ALLOWED_HOSTS: "example.com"
          FRONTEND_ORIGINS: "https://example.com"
          CORS_ALLOWED_ORIGINS: "https://example.com"
          DB_ENGINE: "django.db.backends.postgresql"
          DB_NAME: "ci"
          DB_USER: "ci"
          DB_PASSWORD: "ci"
          DB_HOST: "localhost"
          DB_PORT: "5432"
          REDIS_URL: "redis://localhost:6379/1"
          DJANGO_EMAIL_BACKEND: "django.core.mail.backends.smtp.EmailBackend"
          SECURE_SSL_REDIRECT: "true"
          SECURE_HSTS_SECONDS: "15552000"
          SECURE_HSTS_INCLUDE_SUBDOMAINS: "true"
          SECURE_HSTS_PRELOAD: "true"
        run: .venv/bin/python manage.py check --deploy

  frontend-quality:
    name: Frontend Build + Contract Check + E2E Smoke
    runs-on: ubuntu-latest
    needs: security-audit
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify frontend-backend contract
        run: npm run verify:endpoints

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend e2e smoke
        run: npm run test:e2e -- tests/e2e/logout.spec.js

      - name: Build frontend
        run: npm run build
