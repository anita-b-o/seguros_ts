version: "3.9"
services:
  backend:
    # Docker strategy: app runtime stack (backend + redis).
    # For hardened production with Nginx/systemd, use deploy/README_DEPLOY.md.
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - backend/.env
    environment:
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
